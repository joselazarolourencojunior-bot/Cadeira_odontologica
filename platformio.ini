; PlatformIO Project Configuration File
;
; Projeto: Cadeira Odontológica com ESP32
; Descrição: Controle via Bluetooth Serial + WiFiManager + Supabase
;

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Configurações de memória e partição
board_build.partitions = huge_app.csv

; Bibliotecas necessárias
lib_deps = 
    https://github.com/tzapu/WiFiManager.git
    bblanchon/ArduinoJson@^6.21.3

; Configurações do monitor serial
monitor_filters = 
    default
    esp32_exception_decoder

; Porta serial (ajuste conforme necessário)
; upload_port = COM3
; monitor_port = COM3

; Opções de debug
; build_type = debug
